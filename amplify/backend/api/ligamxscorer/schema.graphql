type Match @model
  @auth(rules: [
    { allow: groups, groups: ["admin"], operations: [create, update, delete] },
    { allow: private, operations: [read] }
  ]) {
  weekId: String! @index(name: "byWeekId", queryField: "matchesByWeek")
  matchId: String!
  homeTeam: String!
  awayTeam: String!
  matchDate: AWSDateTime!
  result: String  # "H" = home win, "D" = draw, "A" = away win, null = not played yet
  locked: Boolean
}

type Prediction @model
  @auth(rules: [
    { allow: owner, ownerField: "username", operations: [create, update] },
    { allow: private, operations: [read] }
  ]) {
  username: String! @index(name: "byUsername", queryField: "predictionsByUser")
  weekMatchId: String!  # format: weekId#matchId
  weekId: String! @index(name: "byWeek", queryField: "predictionsByWeek")
  matchId: String!
  prediction: String!  # "H", "D", or "A"
}

type WeeklyScore @model
  @auth(rules: [
    { allow: groups, groups: ["admin"], operations: [create, update, delete, read] },
    { allow: private, operations: [read] }
  ]) {
  weekId: String! @index(name: "byWeekId", queryField: "scoresByWeek")
  username: String!
  score: Int!
}

type SeasonScore @model
  @auth(rules: [
    { allow: groups, groups: ["admin"], operations: [create, update, delete, read] },
    { allow: private, operations: [read] }
  ]) {
  season: String! @index(name: "bySeason", queryField: "scoresBySeason")
  username: String!
  totalScore: Int!
}

type Group @model
  @auth(rules: [
    { allow: groups, groups: ["admin"], operations: [create, update, delete, read] },
    { allow: private, operations: [read] }
  ]) {
  name: String!
  joinCode: String! @index(name: "byJoinCode", queryField: "groupByJoinCode")
  createdBy: String!
}

type Mutation {
  adminSync(action: String!): String
    @function(name: "fixtureSync-${env}")
    @auth(rules: [{ allow: groups, groups: ["admin"] }])
}

type GroupMember @model
  @auth(rules: [
    { allow: groups, groups: ["admin"], operations: [create, delete, read] },
    { allow: owner, ownerField: "username", operations: [create, update, delete, read] },
    { allow: private, operations: [read] }
  ]) {
  groupId: String! @index(name: "byGroup", queryField: "membersByGroup")
  username: String! @index(name: "byUsername", queryField: "groupsByUsername")
  displayName: String
}
